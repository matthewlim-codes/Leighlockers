<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <title>Mobile 3D Map Walkthrough</title>
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      position: fixed;
      overscroll-behavior: none;
      background: #0d1321;
      color: #eef4ff;
      font-family: Arial, sans-serif;
      touch-action: none;
    }

    canvas {
      display: block;
      touch-action: none;
    }

    #hud {
      position: fixed;
      top: max(12px, env(safe-area-inset-top));
      left: max(12px, env(safe-area-inset-left));
      right: calc(max(12px, env(safe-area-inset-right)) + 56px);
      max-width: 420px;
      padding: 10px 12px;
      background: rgba(13, 19, 33, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 14px;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.24);
      font-size: clamp(12px, 3.2vw, 15px);
      line-height: 1.45;
      user-select: none;
      pointer-events: none;
      z-index: 5;
    }

    #status {
      margin-top: 6px;
      color: #9ec8ff;
      font-size: clamp(11px, 3vw, 13px);
    }

    #surface-panel {
      position: fixed;
      left: max(12px, env(safe-area-inset-left));
      right: max(12px, env(safe-area-inset-right));
      bottom: calc(max(22px, env(safe-area-inset-bottom)) + min(34vw, 150px) + 14px);
      z-index: 5;
      display: flex;
      align-items: center;
      gap: 8px;
      max-width: 430px;
      padding: 8px;
      background: rgba(13, 19, 33, 0.66);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 16px;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.22);
      pointer-events: auto;
      touch-action: manipulation;
      user-select: none;
    }

    #surface-label {
      flex: 1;
      min-width: 0;
      color: #dcecff;
      font-size: clamp(11px, 3vw, 13px);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .surface-button {
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 12px;
      padding: 8px 10px;
      background: rgba(255, 255, 255, 0.1);
      color: #eef4ff;
      font: inherit;
      font-size: clamp(11px, 3vw, 13px);
    }

    .surface-button.is-active {
      background: rgba(158, 200, 255, 0.86);
      color: #0d1321;
      border-color: rgba(255, 255, 255, 0.76);
    }

    #mobile-controls {
      position: fixed;
      inset: 0;
      z-index: 4;
      pointer-events: none;
      touch-action: none;
      user-select: none;
    }

    #joystick {
      position: absolute;
      left: max(20px, env(safe-area-inset-left));
      bottom: max(22px, env(safe-area-inset-bottom));
      width: min(34vw, 150px);
      height: min(34vw, 150px);
      min-width: 112px;
      min-height: 112px;
      border-radius: 50%;
      background: rgba(8, 14, 26, 0.34);
      border: 2px solid rgba(255, 255, 255, 0.28);
      box-shadow: inset 0 0 28px rgba(255, 255, 255, 0.08), 0 12px 34px rgba(0, 0, 0, 0.28);
      pointer-events: auto;
      touch-action: none;
    }

    #joystick-knob {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 46%;
      height: 46%;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      background: rgba(158, 200, 255, 0.74);
      border: 2px solid rgba(255, 255, 255, 0.68);
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.26);
    }

    #look-zone {
      position: absolute;
      right: max(12px, env(safe-area-inset-right));
      bottom: max(22px, env(safe-area-inset-bottom));
      width: min(42vw, 190px);
      height: min(32vw, 140px);
      min-width: 132px;
      min-height: 96px;
      border-radius: 22px;
      background: rgba(8, 14, 26, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.16);
      color: rgba(238, 244, 255, 0.72);
      display: grid;
      place-items: center;
      font-size: clamp(11px, 2.8vw, 13px);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      pointer-events: auto;
      touch-action: none;
    }

    #fullscreen-button {
      position: absolute;
      top: max(12px, env(safe-area-inset-top));
      right: max(12px, env(safe-area-inset-right));
      width: 44px;
      height: 44px;
      border: 1px solid rgba(255, 255, 255, 0.24);
      border-radius: 14px;
      background: rgba(13, 19, 33, 0.72);
      color: #eef4ff;
      font-size: 22px;
      line-height: 1;
      pointer-events: auto;
      touch-action: manipulation;
    }

    @media (orientation: landscape) and (max-height: 520px) {
      #hud {
        max-width: 340px;
      }

      #surface-panel {
        left: calc(max(20px, env(safe-area-inset-left)) + min(26vw, 132px) + 12px);
        right: calc(max(12px, env(safe-area-inset-right)) + min(34vw, 176px) + 12px);
        bottom: max(22px, env(safe-area-inset-bottom));
      }

      #joystick {
        width: min(26vw, 132px);
        height: min(26vw, 132px);
      }

      #look-zone {
        width: min(34vw, 176px);
        height: min(24vw, 116px);
      }
    }
  </style>
</head>
<body>
  <div id="hud">
    <strong>Mobile 3D Map Walkthrough</strong><br>
    Left thumbstick: move<br>
    Right touch pad: look around
    <div id="status">Loading uploaded GLTF ZIP...</div>
  </div>
  <div id="surface-panel" aria-label="Walkable surface selector">
    <div id="surface-label">Walk layer: Hallway</div>
    <button class="surface-button is-active" type="button" data-surface-mode="hallway">Hallway</button>
    <button class="surface-button" type="button" data-surface-mode="roof">Roof</button>
  </div>
  <div id="mobile-controls" aria-label="Mobile touch controls">
    <button id="fullscreen-button" type="button" aria-label="Enter fullscreen">[]</button>
    <div id="joystick" aria-label="Move player">
      <div id="joystick-knob"></div>
    </div>
    <div id="look-zone" aria-label="Look around">Swipe to look</div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "jszip": "https://cdn.jsdelivr.net/npm/jszip@3.10.1/+esm",
        "three": "https://unpkg.com/three@0.166.1/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.166.1/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import JSZip from 'jszip';
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    const MAP_ZIP_URL = './a5c9110e60d2_gltf.zip';
    const MAP_URL = './assets/map_replica.gltf';
    const TARGET_MAP_SIZE = 80;
    const PLAYER_SCALE = 0.5;
    const PLAYER_RADIUS = 0.35 * PLAYER_SCALE;
    const PLAYER_HEIGHT = 1.8 * PLAYER_SCALE;
    const PLAYER_SPEED = 6.0 * PLAYER_SCALE;
    const RAYCAST_HEIGHT = 80;
    const MAX_STEP_HEIGHT = 1.25 * PLAYER_SCALE;
    const CAMERA_MIN_DISTANCE = 2.2;
    const CAMERA_MAX_DISTANCE = 10;
    const MOBILE_MAX_PIXEL_RATIO = 1.5;
    const JOYSTICK_DEAD_ZONE = 0.12;
    const LOOK_SENSITIVITY_X = 0.008;
    const LOOK_SENSITIVITY_Y = 0.005;
    const SURFACE_HALLWAY = 'hallway';
    const SURFACE_ROOF = 'roof';
    const ROOF_HEIGHT_RATIO = 0.58;
    const MIN_WALKABLE_NORMAL_Y = 0.35;

    const statusEl = document.getElementById('status');
    const surfaceLabelEl = document.getElementById('surface-label');
    const surfaceModeButtons = Array.from(document.querySelectorAll('[data-surface-mode]'));
    const joystickEl = document.getElementById('joystick');
    const joystickKnobEl = document.getElementById('joystick-knob');
    const lookZoneEl = document.getElementById('look-zone');
    const fullscreenButtonEl = document.getElementById('fullscreen-button');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x88b7e8);
    scene.fog = new THREE.Fog(0x88b7e8, 90, 180);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    resizeRenderer();
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.45);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.8);
    directionalLight.position.set(24, 42, 18);
    directionalLight.castShadow = true;
    directionalLight.shadow.mapSize.set(2048, 2048);
    directionalLight.shadow.camera.near = 1;
    directionalLight.shadow.camera.far = 120;
    directionalLight.shadow.camera.left = -70;
    directionalLight.shadow.camera.right = 70;
    directionalLight.shadow.camera.top = 70;
    directionalLight.shadow.camera.bottom = -70;
    scene.add(directionalLight);

    const player = new THREE.Group();
    player.position.set(0, PLAYER_HEIGHT / 2, 0);
    scene.add(player);

    const bodyGeometry = new THREE.CapsuleGeometry(PLAYER_RADIUS, PLAYER_HEIGHT - PLAYER_RADIUS * 2, 8, 16);
    const bodyMaterial = new THREE.MeshStandardMaterial({
      color: 0x2f80ed,
      roughness: 0.55,
      metalness: 0.05
    });
    const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
    body.castShadow = true;
    body.position.y = 0;
    player.add(body);

    const faceGeometry = new THREE.SphereGeometry(0.08 * PLAYER_SCALE, 12, 8);
    const faceMaterial = new THREE.MeshStandardMaterial({ color: 0xffffff });
    const face = new THREE.Mesh(faceGeometry, faceMaterial);
    face.position.set(0, PLAYER_HEIGHT * 0.2, PLAYER_RADIUS * 0.92);
    player.add(face);

    const fallbackGround = createFallbackGround();
    scene.add(fallbackGround);

    const raycaster = new THREE.Raycaster();
    const downDirection = new THREE.Vector3(0, -1, 0);
    const moveDirection = new THREE.Vector3();
    const cameraForward = new THREE.Vector3();
    const cameraRight = new THREE.Vector3();
    const desiredPosition = new THREE.Vector3();
    const cameraTarget = new THREE.Vector3();
    const smoothedCameraTarget = new THREE.Vector3(0, PLAYER_HEIGHT * 0.6, 0);
    const desiredCameraPosition = new THREE.Vector3();
    const joystickVector = new THREE.Vector2();
    const hitNormal = new THREE.Vector3();

    const groundMeshes = [fallbackGround];
    const keys = new Set();
    const clock = new THREE.Clock();

    let cameraYaw = Math.PI;
    let cameraPitch = THREE.MathUtils.degToRad(26);
    let cameraDistance = 4.5;
    let joystickPointerId = null;
    let lookPointerId = null;
    let lastLookX = 0;
    let lastLookY = 0;
    let mapRoot = null;
    let mapReady = false;
    let activeSurfaceMode = SURFACE_HALLWAY;
    let surfaceMinY = 0;
    let surfaceMaxY = 0;
    let roofCutoffY = Number.POSITIVE_INFINITY;

    camera.position.set(0, 2.5, 4.5);
    camera.lookAt(player.position);

    loadEnvironment();
    addInputHandlers();
    animate();

    async function loadEnvironment() {
      try {
        statusEl.textContent = `Loading ${MAP_ZIP_URL}...`;
        mapRoot = await loadMapArchive(MAP_ZIP_URL);
      } catch (zipError) {
        console.warn('Could not load zipped map replica; trying legacy GLTF path.', zipError);

        try {
          statusEl.textContent = `Loading ${MAP_URL}...`;
          mapRoot = await loadSingleGltf(MAP_URL);
        } catch (gltfError) {
          console.error('Could not load map replica:', gltfError);
          mapReady = false;
          statusEl.textContent = 'Map could not be loaded; using fallback ground. Check the uploaded ZIP or ./assets/map_replica.gltf.';
          return;
        }
      }

      mapRoot.name = 'Loaded map replica';
      scene.add(mapRoot);

      normalizeMapToScene(mapRoot);
      configureSurfaceClassifier(mapRoot);
      registerGroundMeshes(mapRoot);

      mapRoot.updateMatrixWorld(true);
      fallbackGround.visible = false;
      mapReady = true;

      placePlayerAtSpawn();
      updateSurfaceUi();
      statusEl.textContent = 'Map loaded. Use Hallway mode to stay below roof geometry.';
    }

    async function loadMapArchive(url) {
      const response = await fetch(url);
      if (!response.ok) {
        throw new Error(`Failed to fetch ${url}: ${response.status} ${response.statusText}`);
      }

      const zip = await JSZip.loadAsync(await response.arrayBuffer());
      const gltfFiles = Object.values(zip.files)
        .filter((file) => !file.dir && file.name.toLowerCase().endsWith('.gltf'))
        .sort((a, b) => naturalCompare(a.name, b.name));

      if (gltfFiles.length === 0) {
        throw new Error(`No .gltf files found in ${url}`);
      }

      const archiveUrls = await createArchiveObjectUrls(zip);
      const manager = new THREE.LoadingManager();
      manager.setURLModifier((assetUrl) => resolveArchiveUrl(assetUrl, archiveUrls.urls));

      const loader = new GLTFLoader(manager);
      const root = new THREE.Group();
      root.name = 'Loaded map replica archive';

      try {
        for (let index = 0; index < gltfFiles.length; index += 1) {
          const gltfFile = gltfFiles[index];
          statusEl.textContent = `Loading map chunk ${index + 1} of ${gltfFiles.length}...`;

          const gltfText = await gltfFile.async('text');
          const gltf = await parseGltf(loader, gltfText);
          gltf.scene.name = gltfFile.name;
          root.add(gltf.scene);
        }
      } finally {
        archiveUrls.revoke();
      }

      return root;
    }

    function loadSingleGltf(url) {
      const loader = new GLTFLoader();

      return new Promise((resolve, reject) => {
        loader.load(url, (gltf) => resolve(gltf.scene), undefined, reject);
      });
    }

    function parseGltf(loader, gltfText) {
      return new Promise((resolve, reject) => {
        loader.parse(gltfText, '', resolve, reject);
      });
    }

    async function createArchiveObjectUrls(zip) {
      const urls = new Map();
      const objectUrls = new Set();
      const files = Object.values(zip.files).filter((file) => !file.dir);

      await Promise.all(files.map(async (file) => {
        const buffer = await file.async('arraybuffer');
        const objectUrl = URL.createObjectURL(new Blob([buffer], { type: getMimeType(file.name) }));
        const normalizedName = normalizeArchivePath(file.name);
        const basename = normalizedName.split('/').pop();

        urls.set(normalizedName, objectUrl);
        urls.set(`./${normalizedName}`, objectUrl);
        if (basename) urls.set(basename, objectUrl);

        objectUrls.add(objectUrl);
      }));

      return {
        urls,
        revoke() {
          objectUrls.forEach((objectUrl) => URL.revokeObjectURL(objectUrl));
        }
      };
    }

    function resolveArchiveUrl(assetUrl, urls) {
      const normalizedUrl = normalizeArchivePath(assetUrl);
      const basename = normalizedUrl.split('/').pop();

      return urls.get(normalizedUrl) || urls.get(`./${normalizedUrl}`) || urls.get(basename) || assetUrl;
    }

    function normalizeArchivePath(path) {
      return safeDecodeURIComponent(path)
        .split(/[?#]/)[0]
        .replace(/\\/g, '/')
        .replace(/^\.\//, '');
    }

    function safeDecodeURIComponent(value) {
      try {
        return decodeURIComponent(value);
      } catch {
        return value;
      }
    }

    function getMimeType(path) {
      const extension = path.split('.').pop().toLowerCase();

      switch (extension) {
        case 'bin':
          return 'application/octet-stream';
        case 'gltf':
          return 'model/gltf+json';
        case 'jpg':
        case 'jpeg':
          return 'image/jpeg';
        case 'png':
          return 'image/png';
        case 'webp':
          return 'image/webp';
        default:
          return 'application/octet-stream';
      }
    }

    function naturalCompare(a, b) {
      return a.localeCompare(b, undefined, { numeric: true, sensitivity: 'base' });
    }

    function registerGroundMeshes(root) {
      groundMeshes.length = 0;
      root.traverse((object) => {
        if (!object.isMesh) return;

        object.castShadow = true;
        object.receiveShadow = true;
        setMaterialSide(object.material, THREE.DoubleSide);
        object.geometry.computeBoundingBox();
        groundMeshes.push(object);
      });
    }

    function normalizeMapToScene(root) {
      root.updateMatrixWorld(true);

      const box = new THREE.Box3().setFromObject(root);
      const size = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());
      const largestDimension = Math.max(size.x, size.y, size.z);
      const scale = largestDimension > 0 ? TARGET_MAP_SIZE / largestDimension : 1;

      root.scale.setScalar(scale);
      root.position.sub(center.multiplyScalar(scale));
      root.updateMatrixWorld(true);

      const normalizedBox = new THREE.Box3().setFromObject(root);
      root.position.y -= normalizedBox.min.y;
      root.updateMatrixWorld(true);
    }

    function configureSurfaceClassifier(root) {
      const box = new THREE.Box3().setFromObject(root);
      surfaceMinY = box.min.y;
      surfaceMaxY = box.max.y;
      roofCutoffY = surfaceMinY + (surfaceMaxY - surfaceMinY) * ROOF_HEIGHT_RATIO;
    }

    function placePlayerOnGround(x, z) {
      const hit = findGroundAt(x, z);

      if (hit) {
        player.position.set(x, hit.point.y + PLAYER_HEIGHT / 2, z);
      } else {
        player.position.set(x, PLAYER_HEIGHT / 2, z);
      }
    }

    function placePlayerAtSpawn() {
      const spawnHit = findGroundAt(0, 0) || findNearestGroundAroundCenter();

      if (spawnHit) {
        player.position.set(spawnHit.point.x, spawnHit.point.y + PLAYER_HEIGHT / 2, spawnHit.point.z);
      } else {
        placePlayerOnGround(0, 0);
      }
    }

    function findNearestGroundAroundCenter() {
      const maxRadius = TARGET_MAP_SIZE * 0.45;
      const radiusStep = 2;
      const samplesPerRing = 24;

      for (let radius = radiusStep; radius <= maxRadius; radius += radiusStep) {
        for (let sample = 0; sample < samplesPerRing; sample += 1) {
          const angle = (sample / samplesPerRing) * Math.PI * 2;
          const hit = findGroundAt(Math.cos(angle) * radius, Math.sin(angle) * radius);

          if (hit) return hit;
        }
      }

      return null;
    }

    function findGroundAt(x, z, mode = activeSurfaceMode) {
      if (groundMeshes.length === 0) return null;

      raycaster.set(new THREE.Vector3(x, RAYCAST_HEIGHT, z), downDirection);
      raycaster.far = RAYCAST_HEIGHT * 2;

      const hits = raycaster.intersectObjects(groundMeshes, false);
      return selectSurfaceHit(hits, mode);
    }

    function selectSurfaceHit(hits, mode) {
      for (const hit of hits) {
        if (!isWalkableSurface(hit)) continue;

        const isRoof = hit.point.y >= roofCutoffY;
        if ((mode === SURFACE_ROOF && isRoof) || (mode === SURFACE_HALLWAY && !isRoof)) {
          return hit;
        }
      }

      return null;
    }

    function isWalkableSurface(hit) {
      if (!hit.face) return true;

      hitNormal.copy(hit.face.normal).transformDirection(hit.object.matrixWorld);
      return hitNormal.y >= MIN_WALKABLE_NORMAL_Y;
    }

    function createFallbackGround() {
      const geometry = new THREE.PlaneGeometry(TARGET_MAP_SIZE, TARGET_MAP_SIZE, 40, 40);
      geometry.rotateX(-Math.PI / 2);

      const material = new THREE.MeshStandardMaterial({
        color: 0x6f8f57,
        roughness: 0.95
      });

      const mesh = new THREE.Mesh(geometry, material);
      mesh.name = 'Fallback ground';
      mesh.receiveShadow = true;
      return mesh;
    }

    function setMaterialSide(material, side) {
      if (Array.isArray(material)) {
        material.forEach((entry) => setMaterialSide(entry, side));
        return;
      }

      if (!material) return;

      material.side = side;
      material.needsUpdate = true;
    }

    function addInputHandlers() {
      window.addEventListener('keydown', (event) => {
        keys.add(event.key.toLowerCase());
        if (isMovementKey(event.key)) event.preventDefault();
      });

      window.addEventListener('keyup', (event) => {
        keys.delete(event.key.toLowerCase());
        if (isMovementKey(event.key)) event.preventDefault();
      });

      surfaceModeButtons.forEach((button) => {
        button.addEventListener('click', () => {
          setSurfaceMode(button.dataset.surfaceMode);
        });
      });

      joystickEl.addEventListener('pointerdown', (event) => {
        event.preventDefault();
        joystickPointerId = event.pointerId;
        joystickEl.setPointerCapture(event.pointerId);
        updateJoystickFromPointer(event);
      });

      joystickEl.addEventListener('pointermove', (event) => {
        if (event.pointerId !== joystickPointerId) return;

        event.preventDefault();
        updateJoystickFromPointer(event);
      });

      joystickEl.addEventListener('pointerup', resetJoystick);
      joystickEl.addEventListener('pointercancel', resetJoystick);

      lookZoneEl.addEventListener('pointerdown', (event) => {
        event.preventDefault();
        lookPointerId = event.pointerId;
        lastLookX = event.clientX;
        lastLookY = event.clientY;
        lookZoneEl.setPointerCapture(event.pointerId);
      });

      lookZoneEl.addEventListener('pointermove', (event) => {
        if (event.pointerId !== lookPointerId) return;

        event.preventDefault();
        rotateCameraFromPointer(event.clientX - lastLookX, event.clientY - lastLookY);
        lastLookX = event.clientX;
        lastLookY = event.clientY;
      });

      lookZoneEl.addEventListener('pointerup', resetLookPointer);
      lookZoneEl.addEventListener('pointercancel', resetLookPointer);

      renderer.domElement.addEventListener('pointerdown', (event) => {
        if (event.clientX < window.innerWidth * 0.45) return;

        event.preventDefault();
        lookPointerId = event.pointerId;
        lastLookX = event.clientX;
        lastLookY = event.clientY;
        renderer.domElement.setPointerCapture(event.pointerId);
      });

      renderer.domElement.addEventListener('pointermove', (event) => {
        if (event.pointerId !== lookPointerId) return;

        event.preventDefault();
        rotateCameraFromPointer(event.clientX - lastLookX, event.clientY - lastLookY);
        lastLookX = event.clientX;
        lastLookY = event.clientY;
      });

      renderer.domElement.addEventListener('pointerup', resetLookPointer);
      renderer.domElement.addEventListener('pointercancel', resetLookPointer);

      fullscreenButtonEl.addEventListener('click', async () => {
        try {
          if (!document.fullscreenElement) {
            await document.documentElement.requestFullscreen();
          } else {
            await document.exitFullscreen();
          }
        } catch (error) {
          console.warn('Fullscreen request failed:', error);
        }
      });

      window.addEventListener('contextmenu', (event) => {
        event.preventDefault();
      });

      window.addEventListener('resize', () => {
        resizeRenderer();
      });
    }

    function updateJoystickFromPointer(event) {
      const rect = joystickEl.getBoundingClientRect();
      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top + rect.height / 2;
      const maxDistance = rect.width * 0.36;
      const rawX = event.clientX - centerX;
      const rawY = event.clientY - centerY;
      const distance = Math.min(Math.hypot(rawX, rawY), maxDistance);
      const angle = Math.atan2(rawY, rawX);
      const knobX = Math.cos(angle) * distance;
      const knobY = Math.sin(angle) * distance;

      joystickVector.set(knobX / maxDistance, -knobY / maxDistance);

      if (joystickVector.length() < JOYSTICK_DEAD_ZONE) {
        joystickVector.set(0, 0);
      }

      joystickKnobEl.style.transform = `translate(calc(-50% + ${knobX}px), calc(-50% + ${knobY}px))`;
    }

    function resetJoystick(event) {
      if (event.pointerId !== joystickPointerId) return;

      event.preventDefault();
      joystickPointerId = null;
      joystickVector.set(0, 0);
      joystickKnobEl.style.transform = 'translate(-50%, -50%)';

      if (joystickEl.hasPointerCapture(event.pointerId)) {
        joystickEl.releasePointerCapture(event.pointerId);
      }
    }

    function rotateCameraFromPointer(deltaX, deltaY) {
      cameraYaw -= deltaX * LOOK_SENSITIVITY_X;
      cameraPitch = THREE.MathUtils.clamp(
        cameraPitch + deltaY * LOOK_SENSITIVITY_Y,
        THREE.MathUtils.degToRad(-10),
        THREE.MathUtils.degToRad(70)
      );
    }

    function resetLookPointer(event) {
      if (event.pointerId !== lookPointerId) return;

      event.preventDefault();
      lookPointerId = null;

      if (event.currentTarget.hasPointerCapture(event.pointerId)) {
        event.currentTarget.releasePointerCapture(event.pointerId);
      }
    }

    function resizeRenderer() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, MOBILE_MAX_PIXEL_RATIO));
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function isMovementKey(key) {
      return ['w', 'a', 's', 'd', 'arrowup', 'arrowleft', 'arrowdown', 'arrowright'].includes(key.toLowerCase());
    }

    function setSurfaceMode(mode) {
      if (![SURFACE_HALLWAY, SURFACE_ROOF].includes(mode) || mode === activeSurfaceMode) return;

      activeSurfaceMode = mode;
      updateSurfaceUi();
      placePlayerAtSpawn();
    }

    function updateSurfaceUi() {
      const label = activeSurfaceMode === SURFACE_ROOF ? 'Roof' : 'Hallway';
      const cutoffText = Number.isFinite(roofCutoffY) ? ` cutoff ${roofCutoffY.toFixed(1)}m` : '';
      surfaceLabelEl.textContent = `Walk layer: ${label}${cutoffText}`;

      surfaceModeButtons.forEach((button) => {
        button.classList.toggle('is-active', button.dataset.surfaceMode === activeSurfaceMode);
      });
    }

    function updatePlayer(deltaTime) {
      moveDirection.set(0, 0, 0);

      camera.getWorldDirection(cameraForward);
      cameraForward.y = 0;
      cameraForward.normalize();

      cameraRight.crossVectors(cameraForward, camera.up).normalize();

      if (keys.has('w') || keys.has('arrowup')) moveDirection.add(cameraForward);
      if (keys.has('s') || keys.has('arrowdown')) moveDirection.sub(cameraForward);
      if (keys.has('a') || keys.has('arrowleft')) moveDirection.sub(cameraRight);
      if (keys.has('d') || keys.has('arrowright')) moveDirection.add(cameraRight);
      if (joystickVector.lengthSq() > 0) {
        moveDirection.addScaledVector(cameraForward, joystickVector.y);
        moveDirection.addScaledVector(cameraRight, joystickVector.x);
      }

      if (moveDirection.lengthSq() === 0) {
        keepPlayerGrounded();
        return;
      }

      moveDirection.normalize();
      desiredPosition.copy(player.position).addScaledVector(moveDirection, PLAYER_SPEED * deltaTime);

      const groundHit = findGroundAt(desiredPosition.x, desiredPosition.z);
      if (!groundHit) {
        keepPlayerGrounded();
        return;
      }

      const currentGroundY = player.position.y - PLAYER_HEIGHT / 2;
      const nextGroundY = groundHit.point.y;

      // Refuse sudden vertical jumps; this keeps the avatar from snapping up walls or off the mesh.
      if (Math.abs(nextGroundY - currentGroundY) <= MAX_STEP_HEIGHT || !mapReady) {
        player.position.set(
          desiredPosition.x,
          nextGroundY + PLAYER_HEIGHT / 2,
          desiredPosition.z
        );

        const targetYaw = Math.atan2(moveDirection.x, moveDirection.z);
        player.rotation.y = dampAngle(player.rotation.y, targetYaw, 12, deltaTime);
      } else {
        keepPlayerGrounded();
      }
    }

    function keepPlayerGrounded() {
      const groundHit = findGroundAt(player.position.x, player.position.z);

      if (groundHit) {
        player.position.y = groundHit.point.y + PLAYER_HEIGHT / 2;
      }
    }

    function updateCamera(deltaTime) {
      cameraTarget.set(
        player.position.x,
        player.position.y + PLAYER_HEIGHT * 0.45,
        player.position.z
      );
      smoothedCameraTarget.lerp(cameraTarget, 1 - Math.exp(-8 * deltaTime));

      const horizontalDistance = Math.cos(cameraPitch) * cameraDistance;
      desiredCameraPosition.set(
        smoothedCameraTarget.x + Math.sin(cameraYaw) * horizontalDistance,
        smoothedCameraTarget.y + Math.sin(cameraPitch) * cameraDistance,
        smoothedCameraTarget.z + Math.cos(cameraYaw) * horizontalDistance
      );

      camera.position.lerp(desiredCameraPosition, 1 - Math.exp(-10 * deltaTime));
      camera.lookAt(smoothedCameraTarget);
    }

    function dampAngle(current, target, smoothing, deltaTime) {
      const delta = THREE.MathUtils.euclideanModulo(target - current + Math.PI, Math.PI * 2) - Math.PI;
      return current + delta * (1 - Math.exp(-smoothing * deltaTime));
    }

    function animate() {
      requestAnimationFrame(animate);

      const deltaTime = Math.min(clock.getDelta(), 0.05);
      updatePlayer(deltaTime);
      updateCamera(deltaTime);
      renderer.render(scene, camera);
    }
  </script>
</body>
</html>
