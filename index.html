<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Three.js Map Walkthrough</title>
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #0d1321;
      color: #eef4ff;
      font-family: Arial, sans-serif;
    }

    canvas {
      display: block;
    }

    #hud {
      position: fixed;
      top: 16px;
      left: 16px;
      max-width: 360px;
      padding: 12px 14px;
      background: rgba(13, 19, 33, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 10px;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.24);
      font-size: 14px;
      line-height: 1.45;
      user-select: none;
      pointer-events: none;
    }

    #status {
      margin-top: 6px;
      color: #9ec8ff;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div id="hud">
    <strong>3D Map Walkthrough</strong><br>
    Move: WASD / Arrow keys<br>
    Camera: drag mouse, scroll to zoom
    <div id="status">Loading uploaded GLTF ZIP...</div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "jszip": "https://cdn.jsdelivr.net/npm/jszip@3.10.1/+esm",
        "three": "https://unpkg.com/three@0.166.1/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.166.1/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import JSZip from 'jszip';
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    const MAP_ZIP_URL = './a5c9110e60d2_gltf.zip';
    const MAP_URL = './assets/map_replica.gltf';
    const TARGET_MAP_SIZE = 80;
    const PLAYER_RADIUS = 0.35;
    const PLAYER_HEIGHT = 1.8;
    const PLAYER_SPEED = 6.0;
    const RAYCAST_HEIGHT = 80;
    const MAX_STEP_HEIGHT = 1.25;
    const CAMERA_MIN_DISTANCE = 3.5;
    const CAMERA_MAX_DISTANCE = 16;

    const statusEl = document.getElementById('status');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x88b7e8);
    scene.fog = new THREE.Fog(0x88b7e8, 90, 180);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.45);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.8);
    directionalLight.position.set(24, 42, 18);
    directionalLight.castShadow = true;
    directionalLight.shadow.mapSize.set(2048, 2048);
    directionalLight.shadow.camera.near = 1;
    directionalLight.shadow.camera.far = 120;
    directionalLight.shadow.camera.left = -70;
    directionalLight.shadow.camera.right = 70;
    directionalLight.shadow.camera.top = 70;
    directionalLight.shadow.camera.bottom = -70;
    scene.add(directionalLight);

    const player = new THREE.Group();
    player.position.set(0, PLAYER_HEIGHT / 2, 0);
    scene.add(player);

    const bodyGeometry = new THREE.CapsuleGeometry(PLAYER_RADIUS, PLAYER_HEIGHT - PLAYER_RADIUS * 2, 8, 16);
    const bodyMaterial = new THREE.MeshStandardMaterial({
      color: 0x2f80ed,
      roughness: 0.55,
      metalness: 0.05
    });
    const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
    body.castShadow = true;
    body.position.y = 0;
    player.add(body);

    const faceGeometry = new THREE.SphereGeometry(0.08, 12, 8);
    const faceMaterial = new THREE.MeshStandardMaterial({ color: 0xffffff });
    const face = new THREE.Mesh(faceGeometry, faceMaterial);
    face.position.set(0, 0.36, PLAYER_RADIUS * 0.92);
    player.add(face);

    const fallbackGround = createFallbackGround();
    scene.add(fallbackGround);

    const raycaster = new THREE.Raycaster();
    const downDirection = new THREE.Vector3(0, -1, 0);
    const moveDirection = new THREE.Vector3();
    const cameraForward = new THREE.Vector3();
    const cameraRight = new THREE.Vector3();
    const desiredPosition = new THREE.Vector3();
    const cameraTarget = new THREE.Vector3();
    const smoothedCameraTarget = new THREE.Vector3(0, PLAYER_HEIGHT * 0.6, 0);
    const desiredCameraPosition = new THREE.Vector3();

    const groundMeshes = [fallbackGround];
    const keys = new Set();
    const clock = new THREE.Clock();

    let cameraYaw = Math.PI;
    let cameraPitch = THREE.MathUtils.degToRad(26);
    let cameraDistance = 8;
    let isDraggingCamera = false;
    let lastPointerX = 0;
    let lastPointerY = 0;
    let mapRoot = null;
    let mapReady = false;

    camera.position.set(0, 5, 8);
    camera.lookAt(player.position);

    loadEnvironment();
    addInputHandlers();
    animate();

    async function loadEnvironment() {
      try {
        statusEl.textContent = `Loading ${MAP_ZIP_URL}...`;
        mapRoot = await loadMapArchive(MAP_ZIP_URL);
      } catch (zipError) {
        console.warn('Could not load zipped map replica; trying legacy GLTF path.', zipError);

        try {
          statusEl.textContent = `Loading ${MAP_URL}...`;
          mapRoot = await loadSingleGltf(MAP_URL);
        } catch (gltfError) {
          console.error('Could not load map replica:', gltfError);
          mapReady = false;
          statusEl.textContent = 'Map could not be loaded; using fallback ground. Check the uploaded ZIP or ./assets/map_replica.gltf.';
          return;
        }
      }

      mapRoot.name = 'Loaded map replica';
      scene.add(mapRoot);

      normalizeMapToScene(mapRoot);
      registerGroundMeshes(mapRoot);

      mapRoot.updateMatrixWorld(true);
      fallbackGround.visible = false;
      mapReady = true;

      placePlayerAtSpawn();
      statusEl.textContent = 'Map loaded. Walk around with WASD or arrow keys.';
    }

    async function loadMapArchive(url) {
      const response = await fetch(url);
      if (!response.ok) {
        throw new Error(`Failed to fetch ${url}: ${response.status} ${response.statusText}`);
      }

      const zip = await JSZip.loadAsync(await response.arrayBuffer());
      const gltfFiles = Object.values(zip.files)
        .filter((file) => !file.dir && file.name.toLowerCase().endsWith('.gltf'))
        .sort((a, b) => naturalCompare(a.name, b.name));

      if (gltfFiles.length === 0) {
        throw new Error(`No .gltf files found in ${url}`);
      }

      const archiveUrls = await createArchiveObjectUrls(zip);
      const manager = new THREE.LoadingManager();
      manager.setURLModifier((assetUrl) => resolveArchiveUrl(assetUrl, archiveUrls.urls));

      const loader = new GLTFLoader(manager);
      const root = new THREE.Group();
      root.name = 'Loaded map replica archive';

      try {
        for (let index = 0; index < gltfFiles.length; index += 1) {
          const gltfFile = gltfFiles[index];
          statusEl.textContent = `Loading map chunk ${index + 1} of ${gltfFiles.length}...`;

          const gltfText = await gltfFile.async('text');
          const gltf = await parseGltf(loader, gltfText);
          gltf.scene.name = gltfFile.name;
          root.add(gltf.scene);
        }
      } finally {
        archiveUrls.revoke();
      }

      return root;
    }

    function loadSingleGltf(url) {
      const loader = new GLTFLoader();

      return new Promise((resolve, reject) => {
        loader.load(url, (gltf) => resolve(gltf.scene), undefined, reject);
      });
    }

    function parseGltf(loader, gltfText) {
      return new Promise((resolve, reject) => {
        loader.parse(gltfText, '', resolve, reject);
      });
    }

    async function createArchiveObjectUrls(zip) {
      const urls = new Map();
      const objectUrls = new Set();
      const files = Object.values(zip.files).filter((file) => !file.dir);

      await Promise.all(files.map(async (file) => {
        const buffer = await file.async('arraybuffer');
        const objectUrl = URL.createObjectURL(new Blob([buffer], { type: getMimeType(file.name) }));
        const normalizedName = normalizeArchivePath(file.name);
        const basename = normalizedName.split('/').pop();

        urls.set(normalizedName, objectUrl);
        urls.set(`./${normalizedName}`, objectUrl);
        if (basename) urls.set(basename, objectUrl);

        objectUrls.add(objectUrl);
      }));

      return {
        urls,
        revoke() {
          objectUrls.forEach((objectUrl) => URL.revokeObjectURL(objectUrl));
        }
      };
    }

    function resolveArchiveUrl(assetUrl, urls) {
      const normalizedUrl = normalizeArchivePath(assetUrl);
      const basename = normalizedUrl.split('/').pop();

      return urls.get(normalizedUrl) || urls.get(`./${normalizedUrl}`) || urls.get(basename) || assetUrl;
    }

    function normalizeArchivePath(path) {
      return safeDecodeURIComponent(path)
        .split(/[?#]/)[0]
        .replace(/\\/g, '/')
        .replace(/^\.\//, '');
    }

    function safeDecodeURIComponent(value) {
      try {
        return decodeURIComponent(value);
      } catch {
        return value;
      }
    }

    function getMimeType(path) {
      const extension = path.split('.').pop().toLowerCase();

      switch (extension) {
        case 'bin':
          return 'application/octet-stream';
        case 'gltf':
          return 'model/gltf+json';
        case 'jpg':
        case 'jpeg':
          return 'image/jpeg';
        case 'png':
          return 'image/png';
        case 'webp':
          return 'image/webp';
        default:
          return 'application/octet-stream';
      }
    }

    function naturalCompare(a, b) {
      return a.localeCompare(b, undefined, { numeric: true, sensitivity: 'base' });
    }

    function registerGroundMeshes(root) {
      groundMeshes.length = 0;
      root.traverse((object) => {
        if (!object.isMesh) return;

        object.castShadow = true;
        object.receiveShadow = true;
        setMaterialSide(object.material, THREE.DoubleSide);
        object.geometry.computeBoundingBox();
        groundMeshes.push(object);
      });
    }

    function normalizeMapToScene(root) {
      root.updateMatrixWorld(true);

      const box = new THREE.Box3().setFromObject(root);
      const size = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());
      const largestDimension = Math.max(size.x, size.y, size.z);
      const scale = largestDimension > 0 ? TARGET_MAP_SIZE / largestDimension : 1;

      root.scale.setScalar(scale);
      root.position.sub(center.multiplyScalar(scale));
      root.updateMatrixWorld(true);

      const normalizedBox = new THREE.Box3().setFromObject(root);
      root.position.y -= normalizedBox.min.y;
      root.updateMatrixWorld(true);
    }

    function placePlayerOnGround(x, z) {
      const hit = findGroundAt(x, z);

      if (hit) {
        player.position.set(x, hit.point.y + PLAYER_HEIGHT / 2, z);
      } else {
        player.position.set(x, PLAYER_HEIGHT / 2, z);
      }
    }

    function placePlayerAtSpawn() {
      const spawnHit = findGroundAt(0, 0) || findNearestGroundAroundCenter();

      if (spawnHit) {
        player.position.set(spawnHit.point.x, spawnHit.point.y + PLAYER_HEIGHT / 2, spawnHit.point.z);
      } else {
        placePlayerOnGround(0, 0);
      }
    }

    function findNearestGroundAroundCenter() {
      const maxRadius = TARGET_MAP_SIZE * 0.45;
      const radiusStep = 2;
      const samplesPerRing = 24;

      for (let radius = radiusStep; radius <= maxRadius; radius += radiusStep) {
        for (let sample = 0; sample < samplesPerRing; sample += 1) {
          const angle = (sample / samplesPerRing) * Math.PI * 2;
          const hit = findGroundAt(Math.cos(angle) * radius, Math.sin(angle) * radius);

          if (hit) return hit;
        }
      }

      return null;
    }

    function findGroundAt(x, z) {
      if (groundMeshes.length === 0) return null;

      raycaster.set(new THREE.Vector3(x, RAYCAST_HEIGHT, z), downDirection);
      raycaster.far = RAYCAST_HEIGHT * 2;

      const hits = raycaster.intersectObjects(groundMeshes, false);
      return hits.length > 0 ? hits[0] : null;
    }

    function createFallbackGround() {
      const geometry = new THREE.PlaneGeometry(TARGET_MAP_SIZE, TARGET_MAP_SIZE, 40, 40);
      geometry.rotateX(-Math.PI / 2);

      const material = new THREE.MeshStandardMaterial({
        color: 0x6f8f57,
        roughness: 0.95
      });

      const mesh = new THREE.Mesh(geometry, material);
      mesh.name = 'Fallback ground';
      mesh.receiveShadow = true;
      return mesh;
    }

    function setMaterialSide(material, side) {
      if (Array.isArray(material)) {
        material.forEach((entry) => setMaterialSide(entry, side));
        return;
      }

      if (!material) return;

      material.side = side;
      material.needsUpdate = true;
    }

    function addInputHandlers() {
      window.addEventListener('keydown', (event) => {
        keys.add(event.key.toLowerCase());
      });

      window.addEventListener('keyup', (event) => {
        keys.delete(event.key.toLowerCase());
      });

      renderer.domElement.addEventListener('pointerdown', (event) => {
        isDraggingCamera = true;
        lastPointerX = event.clientX;
        lastPointerY = event.clientY;
        renderer.domElement.setPointerCapture(event.pointerId);
      });

      renderer.domElement.addEventListener('pointermove', (event) => {
        if (!isDraggingCamera) return;

        const deltaX = event.clientX - lastPointerX;
        const deltaY = event.clientY - lastPointerY;
        lastPointerX = event.clientX;
        lastPointerY = event.clientY;

        cameraYaw -= deltaX * 0.006;
        cameraPitch = THREE.MathUtils.clamp(
          cameraPitch + deltaY * 0.004,
          THREE.MathUtils.degToRad(-8),
          THREE.MathUtils.degToRad(68)
        );
      });

      renderer.domElement.addEventListener('pointerup', (event) => {
        isDraggingCamera = false;
        renderer.domElement.releasePointerCapture(event.pointerId);
      });

      renderer.domElement.addEventListener('wheel', (event) => {
        event.preventDefault();
        cameraDistance = THREE.MathUtils.clamp(
          cameraDistance + event.deltaY * 0.01,
          CAMERA_MIN_DISTANCE,
          CAMERA_MAX_DISTANCE
        );
      }, { passive: false });

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });
    }

    function updatePlayer(deltaTime) {
      moveDirection.set(0, 0, 0);

      camera.getWorldDirection(cameraForward);
      cameraForward.y = 0;
      cameraForward.normalize();

      cameraRight.crossVectors(cameraForward, camera.up).normalize();

      if (keys.has('w') || keys.has('arrowup')) moveDirection.add(cameraForward);
      if (keys.has('s') || keys.has('arrowdown')) moveDirection.sub(cameraForward);
      if (keys.has('a') || keys.has('arrowleft')) moveDirection.sub(cameraRight);
      if (keys.has('d') || keys.has('arrowright')) moveDirection.add(cameraRight);

      if (moveDirection.lengthSq() === 0) {
        keepPlayerGrounded();
        return;
      }

      moveDirection.normalize();
      desiredPosition.copy(player.position).addScaledVector(moveDirection, PLAYER_SPEED * deltaTime);

      const groundHit = findGroundAt(desiredPosition.x, desiredPosition.z);
      if (!groundHit) {
        keepPlayerGrounded();
        return;
      }

      const currentGroundY = player.position.y - PLAYER_HEIGHT / 2;
      const nextGroundY = groundHit.point.y;

      // Refuse sudden vertical jumps; this keeps the avatar from snapping up walls or off the mesh.
      if (Math.abs(nextGroundY - currentGroundY) <= MAX_STEP_HEIGHT || !mapReady) {
        player.position.set(
          desiredPosition.x,
          nextGroundY + PLAYER_HEIGHT / 2,
          desiredPosition.z
        );

        const targetYaw = Math.atan2(moveDirection.x, moveDirection.z);
        player.rotation.y = dampAngle(player.rotation.y, targetYaw, 12, deltaTime);
      } else {
        keepPlayerGrounded();
      }
    }

    function keepPlayerGrounded() {
      const groundHit = findGroundAt(player.position.x, player.position.z);

      if (groundHit) {
        player.position.y = groundHit.point.y + PLAYER_HEIGHT / 2;
      }
    }

    function updateCamera(deltaTime) {
      cameraTarget.set(
        player.position.x,
        player.position.y + PLAYER_HEIGHT * 0.45,
        player.position.z
      );
      smoothedCameraTarget.lerp(cameraTarget, 1 - Math.exp(-8 * deltaTime));

      const horizontalDistance = Math.cos(cameraPitch) * cameraDistance;
      desiredCameraPosition.set(
        smoothedCameraTarget.x + Math.sin(cameraYaw) * horizontalDistance,
        smoothedCameraTarget.y + Math.sin(cameraPitch) * cameraDistance,
        smoothedCameraTarget.z + Math.cos(cameraYaw) * horizontalDistance
      );

      camera.position.lerp(desiredCameraPosition, 1 - Math.exp(-10 * deltaTime));
      camera.lookAt(smoothedCameraTarget);
    }

    function dampAngle(current, target, smoothing, deltaTime) {
      const delta = THREE.MathUtils.euclideanModulo(target - current + Math.PI, Math.PI * 2) - Math.PI;
      return current + delta * (1 - Math.exp(-smoothing * deltaTime));
    }

    function animate() {
      requestAnimationFrame(animate);

      const deltaTime = Math.min(clock.getDelta(), 0.05);
      updatePlayer(deltaTime);
      updateCamera(deltaTime);
      renderer.render(scene, camera);
    }
  </script>
</body>
</html>
